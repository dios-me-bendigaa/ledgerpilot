name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  macos-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install JS dependencies
        run: npm install

      - name: Package desktop app
        run: npm run package:mac --workspace @ledgerpilot/desktop

      - name: Locate DMG artifact
        run: ls apps/desktop/release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/release/*.dmg
