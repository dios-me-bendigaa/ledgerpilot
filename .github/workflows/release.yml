name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install JS dependencies
        run: npm install

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r apps/ai-service/requirements.txt

      - name: Verify workspace
        run: npm run lint && npm run typecheck && npm run test && pytest apps/ai-service/tests

      - name: Package desktop app
        run: npm run package:mac --workspace @ledgerpilot/desktop

      - name: Locate DMG artifact
        run: ls apps/desktop/release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/release/*.dmg
