name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos-release:
    runs-on: macos-15
    env:
      CSC_LINK: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
      CSC_IDENTITY_AUTO_DISCOVERY: true
      APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install JS dependencies
        run: npm install

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r apps/ai-service/requirements.txt

      - name: Validate release signing secrets
        run: |
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          test -n "$APPLE_TEAM_ID"

      - name: Verify workspace
        run: npm run lint && npm run typecheck && npm run test && pytest apps/ai-service/tests

      - name: Install notarization helper
        run: npm install --no-save @electron/notarize

      - name: Package desktop app
        run: npm run package:mac --workspace @ledgerpilot/desktop

      - name: Locate DMG artifact
        run: ls apps/desktop/release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/release/*.dmg
