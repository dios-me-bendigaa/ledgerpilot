name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install JS dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test JS
        run: npm run test

      - name: Install Python dependencies
        run: pip install -r apps/ai-service/requirements.txt

      - name: Test Python
        run: pytest apps/ai-service/tests
